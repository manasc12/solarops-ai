# SolarOps AI — reverse proxy.
# Routes the public surface to the Streamlit console and exposes the API under
# /api so the browser and server-side clients share a single origin.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream solarops_backend {
        server backend:8000;
    }

    upstream solarops_frontend {
        server streamlit:8501;
    }

    server {
        listen 80;
        server_name _;

        # Backend REST API.
        location /api/ {
            proxy_pass http://solarops_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Streamlit console (WebSocket upgrade required).
        location / {
            proxy_pass http://solarops_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }
    }
}
