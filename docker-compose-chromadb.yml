# SolarOps AI — local orchestration of the full stack.
# Backend (FastAPI), Frontend (Streamlit), and an nginx reverse proxy.
services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb_server
    ports:
      - "${CHROMA_PORT}:8000"
    environment:
      - CHROMA_DOCKER=true
      - CHROMA_PORT=8000
      - PERSIST_DIRECTORY=/chroma/chroma
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - DEFAULT_STORAGE_PATH_CHROMA_SERVER=/data
    volumes:
      - ./chroma_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    image: solarops/backend:latest
    environment:
      - APP_ENV=production
      - LLM_USE_MOCK=false # need to change while running in docker
      - WEATHER_USE_MOCK=false # need to change while running in docker
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - solarops_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      chromadb:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: infra/docker/streamlit.Dockerfile
    image: solarops/streamlit:latest
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - streamlit

volumes:
  solarops_data:
