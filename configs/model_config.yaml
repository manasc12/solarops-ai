# SolarOps AI – Model configuration
forecasting:
  model_type: lightgbm        # lightgbm | gradient_boosting (fallback)
  model_version: v1
  n_estimators: 300
  learning_rate: 0.05
  num_leaves: 31
  confidence_interval_pct: 0.15   # +/- band around point forecast

anomaly:
  method: IsolationForest
  contamination: 0.08
  n_estimators: 200
  threshold: 0.6              # anomaly_score above which RCA is triggered
  severity_bands:
    medium: 0.6
    high: 0.8
